spring.application.name=E-Commerce
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=root
spring.datasource.password=root


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# JWT Configuration (use environment variables for security)
# Set via environment variables: JWT_SECRET and JWT_EXPIRATION
# For local development: export JWT_SECRET="your-secret-key"
app.jwt.secret=${JWT_SECRET:dGhpc2lzYXZlcnlzZWN1cmVKV1RzZWNyZXRrZXl0aGF0aXN1c2VkZm9yYXV0aGVudGljYXRpb25wdXJwb3Nlc2luZWNvbW1lcmNlYXBwbGljYXRpb24=}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe Configuration (use environment variables for security)
# Set via environment variables: STRIPE_API_KEY and STRIPE_PUBLISHABLE_KEY
# For local testing: export STRIPE_API_KEY="sk_test_..." and STRIPE_PUBLISHABLE_KEY="pk_test_..."
# Get keys from: https://dashboard.stripe.com/apikeys
stripe.api.key=${STRIPE_API_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}



# Using in-memory rate limiter (RateLimiterService)
rate-limiter:
type: memory

---

# Production Configuration (Redis-based Rate Limiting)
spring:
application:
name: ecommerce-api
redis:
host: ${REDIS_HOST:localhost}
port: ${REDIS_PORT:6379}
password: ${REDIS_PASSWORD:}
timeout: 2000ms
jedis:
pool:
max-active: 20
max-idle: 10
min-idle: 5



# Security Configuration
security:
jwt:
secret: ${JWT_SECRET:your-secret-key-change-in-production}
expiration: 86400000 # 24 hours in milliseconds
cors:
allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:8080}

# Logging Configuration
logging:
level:
root: INFO
com.mjs.ecommerce: DEBUG
pattern:
console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"




