spring.application.name=E-Commerce
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce
spring.datasource.username=root
spring.datasource.password=root


spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# JWT Configuration (use environment variables for security)
# Set via environment variables: JWT_SECRET and JWT_EXPIRATION
# For local development: export JWT_SECRET="your-secret-key"
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Stripe Configuration (use environment variables for security)
# Set via environment variables: STRIPE_API_KEY and STRIPE_PUBLISHABLE_KEY
# For local testing: export STRIPE_API_KEY="sk_test_..." and STRIPE_PUBLISHABLE_KEY="pk_test_..."
# Get keys from: https://dashboard.stripe.com/apikeys
stripe.api.key=${STRIPE_API_KEY:}
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:}

